<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ওয়েটিং রুম ডিসপ্লে (Waiting Room Display) - MediQueue Terminal Suite</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, SolaimanLipi, sans-serif; 
            background: #0f172a; 
            color: white; 
            margin: 0; 
            padding: 1.5vmin; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
        }

        /* FLEX MASTER HEADER WITH INTEGRATED DIGITAL CLOCK */
        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b; 
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1vmin 2vw;
            margin-bottom: 1.5vmin;
            flex-shrink: 0;
        }
        .header-left h1 { 
            margin: 0; 
            font-size: 3.2vmin; 
            color: #38bdf8; 
            font-weight: bold; 
        }
        
        /* Interactive dynamic button text alignment for the audio module */
        .audio-notice { 
            font-size: 1.6vmin; 
            color: #f87171; /* High-visibility soft red for initial 'Muted' state */
            margin: 0.4vh 0 0 0; 
            cursor: pointer; 
            text-decoration: underline; 
            font-weight: 600;
            display: inline-block;
            transition: color 0.2s ease;
        }

        /* Elegant High-Visibility Clock Styling */
        .header-right-clock {
            text-align: right;
            font-family: 'Courier New', Courier, monospace, Arial;
            background: #0f172a;
            padding: 0.8vmin 1.5vw;
            border-radius: 8px;
            border: 1px solid #475569;
            min-width: 18vw;
        }
        .clock-time {
            font-size: 3.2vmin;
            font-weight: bold;
            color: #22c55e; 
            line-height: 1;
        }
        .clock-date {
            font-size: 1.3vmin;
            color: #94a3b8;
            margin-top: 0.2vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        /* LAYOUT CORE: Splitting numbers framework from visual media slider */
        .main-layout-container {
            display: flex;
            flex-grow: 1;
            gap: 1.5vmin;
            min-height: 0;
            width: 100%;
        }

        /* Room dashboard receives 73% viewport space allocation */
        .grid-workspace { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1.5vmin; 
            width: 73%;
            height: 100%;
            min-height: 0; 
        }
        
        /* Dedicated Awareness Panel receives remaining 27% widescreen edge space */
        .awareness-sidebar {
            width: 27%;
            height: 100%;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 16px;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .sidebar-caption {
            background: #111827;
            padding: 1vmin;
            text-align: center;
            font-size: 1.5vmin;
            font-weight: bold;
            color: #38bdf8;
            border-bottom: 1px solid #334155;
            letter-spacing: 0.5px;
        }
        .poster-viewport {
            flex-grow: 1;
            width: 100%;
            position: relative;
            background: #0f172a;
        }
        .poster-viewport img {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            object-fit: contain; 
            opacity: 0;
            transition: opacity 0.8s ease-in-out; 
        }
        .poster-viewport img.active {
            opacity: 1;
        }

        /* CARD INNER STYLES */
        .room-card { 
            background: #1e293b; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            padding: 1.5vmin; 
            border: 2px solid #0284c7; 
            box-sizing: border-box; 
            transition: all 0.3s ease; 
            overflow: hidden;
            height: 100%;
            width: 100%;
        }
        .room-title { 
            font-size: 3.2vmin; 
            font-weight: bold; 
            margin-bottom: 1vmin; 
            flex-shrink: 0;
            color: #38bdf8;
        }
        .current-box { 
            width: 100%; 
            background: #111827; 
            border-radius: 10px; 
            padding: 0.6vmin 1.5vmin; 
            border: 1px solid #374151; 
            box-sizing: border-box; 
            text-align: center; 
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 1.5vmin;
            flex-shrink: 0;
            margin-bottom: 1vmin;
        }
        .current-label { font-size: 1.6vmin; font-weight: bold; color: #94a3b8; }
        .current-number { 
            font-family: Arial, sans-serif; 
            font-size: 4.4vmin; 
            font-weight: 900; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            line-height: 1;
            color: #22c55e;
        }
        .queue-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex-grow: 1; 
            overflow: hidden;
            min-height: 0;
        }
        .queue-label { font-size: 1.8vmin; color: #9ca3af; font-weight: bold; margin-bottom: 1vmin; flex-shrink: 0; }
        .badge-grid { display: flex; flex-wrap: wrap; gap: 0.8vmin; justify-content: center; align-content: flex-start; width: 100%; overflow-y: auto; scrollbar-width: none; }
        .badge-grid::-webkit-scrollbar { display: none; }
        .token-badge { background: #0f172a; border: 1px solid #38bdf8; border-radius: 6px; padding: 0.6vmin 1.8vmin; font-family: Arial, sans-serif; font-size: 3.2vmin; font-weight: 800; color: #bfdbfe; text-align: center; min-width: 6vmin; }
        .flash { transform: scale(1.015); background: #334155 !important; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="header-wrapper">
    <div class="header-left">
        <h1>আল্ট্রাসনোগ্রাফি ও কালার ডপলার সিরিয়াল বোর্ড (Ultrasonography & Color Doppler Serial Board)</h1>
        <p class="audio-notice" id="audioBtn" onclick="toggleAudioSystemState()">🔈 সাউন্ড বন্ধ আছে - চালু করতে এখানে ক্লিক করুন (Sound Off - Click here to Turn On)</p>
    </div>
    <div class="header-right-clock">
        <div class="clock-time" id="liveDigitalClock">00:00:00 AM</div>
        <div class="clock-date" id="liveCalendarReadout">Loading Calendar...</div>
    </div>
</div>

<div class="main-layout-container">
    <div class="grid-workspace" id="monitorDisplayGrid"></div>
    
    <div class="awareness-sidebar">
        <div class="sidebar-caption">রোগীদের জন্য নির্দেশনা (Directions for Patients)</div>
        <div class="poster-viewport" id="posterSliderContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQUOxDh0o2y-aAxLb78tqogLMmcEOvhTg",
        authDomain: "mediqueue-mahmud.firebaseapp.com",
        databaseURL: "https://mediqueue-mahmud-default-rtdb.firebaseio.com",
        projectId: "mediqueue-mahmud",
        storageBucket: "mediqueue-mahmud.firebasestorage.app",
        messagingSenderId: "178718052989",
        appId: "1:178718052989:web:0157c134bcddedb21fd714",
        measurementId: "G-RTEG14XB87"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let localState = {};
    let roomsConfig = [];
    let audioContext = null;
    let isAudioSystemMuted = true; // Audio initialized safely as muted by default configuration rules

    /* 1. CLOCK ENGINE */
    function updateLiveClock() {
        const now = new Date();
        document.getElementById('liveDigitalClock').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('liveCalendarReadout').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
    }
    setInterval(updateLiveClock, 1000);
    updateLiveClock();

    /* 2. DYNAMIC SLIDESHOW ENGINE */
    const awarenessPostersList = [
        "Poster1.png", 
        "Poster2.png", 
        "Poster3.png",
        "Poster4.png",
        "Poster5.png",
        "Poster6.png",
        "Poster7.png",
        "Poster8.png"
    ];
    
    function initSlideshowEngine() {
        const container = document.getElementById('posterSliderContainer');
        container.innerHTML = '';
        
        awarenessPostersList.forEach((src, idx) => {
            const img = document.createElement('img');
            img.src = src;
            if (idx === 0) img.className = 'active';
            container.appendChild(img);
        });

        let activeIdx = 0;
        const images = container.getElementsByTagName('img');
        
        if (images.length > 1) {
            setInterval(() => {
                images[activeIdx].classList.remove('active');
                activeIdx = (activeIdx + 1) % images.length;
                images[activeIdx].classList.add('active');
            }, 8000); 
        }
    }
    initSlideshowEngine();

    /* 3. CLOUD QUEUE NETWORKING SYSTEMS WITH TWO-WAY AUDIO TOGGLE SWITCH */
    function toggleAudioSystemState() {
        // Build the audio hardware API context if it's the very first activation click
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        isAudioSystemMuted = !isAudioSystemMuted;
        const btn = document.getElementById('audioBtn');
        
        if (isAudioSystemMuted) {
            btn.innerText = "🔈 সাউন্ড বন্ধ আছে - চালু করতে এখানে ক্লিক করুন (Sound Off - Click here to Turn On)";
            btn.style.color = "#f87171"; /* Soft Red alert indicator */
            btn.style.textDecoration = "underline";
        } else {
            btn.innerText = "🔊 সাউন্ড চালু আছে - বন্ধ করতে এখানে ক্লিক করুন (Sound On - Click here to Mute)";
            btn.style.color = "#4ade80"; /* Clear green functional indicator */
            btn.style.textDecoration = "none";
            
            // Generate a quick tap chime to confirm the speaker hardware channel is active
            playChime();
        }
    }

    function playChime() {
        // Instantly skip generation calculations if the toggle state is set to muted
        if (!audioContext || isAudioSystemMuted) return;
        try {
            let t = audioContext.currentTime;
            let osc1 = audioContext.createOscillator();
            let osc2 = audioContext.createOscillator();
            let gain = audioContext.createGain();
            osc1.type = 'sine'; osc2.type = 'sine';
            osc1.frequency.setValueAtTime(523.25, t); 
            osc2.frequency.setValueAtTime(659.25, t + 0.15); 
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
            osc1.connect(gain); osc2.connect(gain);
            gain.connect(audioContext.destination);
            osc1.start(t); osc1.stop(t + 0.4);
            osc2.start(t + 0.15); osc2.stop(t + 0.8);
        } catch(e) { console.log(e); }
    }

    database.ref('config/rooms').on('value', (configSnapshot) => {
        roomsConfig = configSnapshot.val() || [];
        const gridElement = document.getElementById('monitorDisplayGrid');
        gridElement.innerHTML = '';

        roomsConfig.forEach(room => {
            const cardHtml = `
                <div class="room-card" id="rm_${room.id}">
                    <div class="room-title">${room.name}</div>
                    <div class="current-box">
                        <span class="current-label">এখন ভেতরে (Now Serving):</span>
                        <span class="current-number" id="d_${room.id}">--</span>
                    </div>
                    <div class="queue-container">
                        <div class="queue-label">পরবর্তী অপেক্ষমাণ সিরিয়ালসমূহ (Upcoming Waiting Serials):</div>
                        <div class="badge-grid" id="q_${room.id}"></div>
                    </div>
                </div>
            `;
            gridElement.innerHTML += cardHtml;
        });

        roomsConfig.forEach(r => { if (!localState[r.id]) localState[r.id] = '--'; });
    });

    database.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        let shouldPlaySound = false;

        roomsConfig.forEach(room => {
            const roomData = data[room.id] || {};
            const currentActive = roomData.current || '--';
            
            const displayElement = document.getElementById('d_' + room.id);
            const cardElement = document.getElementById('rm_' + room.id);

            if (displayElement && localState[room.id] !== currentActive) {
                displayElement.innerText = currentActive;
                localState[room.id] = currentActive;
                shouldPlaySound = true;

                cardElement.classList.add('flash');
                setTimeout(() => cardElement.classList.remove('flash'), 1200);
            }

            const gridElement = document.getElementById('q_' + room.id);
            if (gridElement) {
                if (roomData.queue) {
                    const sortedSerials = Object.keys(roomData.queue).sort((a,b) => parseInt(a)-parseInt(b)).map(k => roomData.queue[k]).filter(v => v !== null);
                    let badgeHtml = '';
                    sortedSerials.forEach((serial) => {
                        badgeHtml += `<div class="token-badge">${serial}</div>`;
                    });
                    gridElement.innerHTML = badgeHtml;
                } else {
                    gridElement.innerHTML = '<div style="color: #475569; font-size: 2.2vmin; margin-top: 2vmin; font-weight: bold;">নেই / ফাঁকা (None / Empty)</div>';
                }
            }
        });

        if (shouldPlaySound) {
            playChime();
        }
    });
</script>
</body>
</html>
