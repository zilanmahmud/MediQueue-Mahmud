<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Advanced Queue Manager</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 2vmin; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .card { 
            background: white; 
            padding: clamp(15px, 4vmin, 30px); 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 520px; 
            box-sizing: border-box;
        }
        
        h2 { 
            color: #1a73e8; 
            margin: 0 0 1vmin 0; 
            text-align: center; 
            font-size: clamp(20px, 5vmin, 28px);
        }

        .date-display {
            text-align: center;
            font-size: clamp(12px, 2.8vmin, 16px);
            color: #475569;
            font-weight: 600;
            margin-bottom: 2vmin;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            box-sizing: border-box;
        }
        
        label { 
            font-weight: bold; 
            color: #4a5568; 
            font-size: clamp(11px, 2.5vmin, 15px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        select, input { 
            width: 100%; 
            padding: clamp(10px, 2.5vmin, 15px); 
            font-size: clamp(16px, 3.5vmin, 22px); 
            border: 2px solid #dadce0; 
            border-radius: 8px; 
            margin: 1vmin 0 2.5vmin 0; 
            box-sizing: border-box; 
        }
        select { 
            background-color: #f8fafc; 
            font-weight: bold; 
            color: #1a73e8; 
            border-color: #1a73e8; 
        }
        
        .main-call-btn { 
            width: 100%; 
            padding: clamp(14px, 3.5vmin, 20px); 
            font-size: clamp(16px, 3.8vmin, 22px); 
            font-weight: bold; 
            color: white; 
            background: #34a853; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 2.5vmin; 
            box-shadow: 0 4px 12px rgba(52,168,83,0.3); 
            transition: background 0.2s;
        }
        .main-call-btn:hover { background: #2c9247; }
        
        .add-btn { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: clamp(10px, 2.8vmin, 15px); 
            font-size: clamp(14px, 3.2vmin, 18px); 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 2.5vmin; 
        }
        .add-btn:hover { background: #155cb4; }
        
        .status-box { 
            padding: 2vmin; 
            background: #f8fafc; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            margin-bottom: 2.5vmin; 
            text-align: center; 
        }
        .current-number { 
            font-size: clamp(28px, 6vmin, 45px); 
            font-weight: 900; 
            color: #ea4335; 
            margin: 0.5vmin 0; 
        }
        
        .queue-section { 
            border-top: 2px dashed #e2e8f0; 
            padding-top: 2.5vmin; 
        }
        
        .queue-list { 
            list-style: none; 
            padding: 0; 
            margin: 1vmin 0 0 0; 
        }
        .queue-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: clamp(8px, 2vmin, 14px); 
            background: #f8fafc; 
            margin-bottom: 1vmin; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            flex-wrap: wrap; 
            gap: 1.5vmin; 
        }
        .queue-item span { 
            font-size: clamp(14px, 3.2vmin, 19px); 
            font-weight: bold; 
            color: #334155; 
            min-width: max-content; 
        }
        
        .action-btns { 
            display: flex; 
            gap: 0.8vmin; 
            flex-wrap: wrap; 
        }
        .action-btns button { 
            padding: clamp(6px, 1.8vmin, 10px) clamp(8px, 2vmin, 12px); 
            font-size: clamp(11px, 2.5vmin, 14px); 
            font-weight: bold; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            color: white; 
        }
        
        .now-btn { background: #e11d48; } 
        .edit-btn { background: #f9ab00; }
        .del-btn { background: #70757a; }
        .order-btn { background: #0284c7; font-size: clamp(12px, 2.8vmin, 15px) !important; } 
        .move-btn { background: #8b5cf6; }

        .config-toggle-btn {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 3vmin;
            font-size: 13px;
        }
        .config-panel {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 3vmin;
            display: none;
        }
        .config-room-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .config-room-row input { margin: 0; padding: 8px; font-size: 14px; }
        .config-del-btn { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .config-add-btn { background: #0284c7; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .config-save-btn { background: #22c55e; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 15px; }

        .reset-section { 
            border-top: 2px solid #e2e8f0; 
            margin-top: 3.5vmin; 
            padding-top: 2.5vmin; 
            text-align: center; 
        }
        .reset-btn { 
            background: #475569; 
            color: white; 
            border: none; 
            padding: clamp(10px, 2.5vmin, 14px) 20px; 
            font-size: clamp(12px, 2.8vmin, 15px); 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2>MediQueue Panel</h2>
    
    <div class="date-display" id="liveDateDisplay">Loading Today's Date...</div>

    <button class="config-toggle-btn" onclick="toggleConfigPanel()">⚙️ Manage Rooms</button>
    <div class="config-panel" id="configPanel">
        <div id="configRoomsContainer"></div>
        <button class="config-add-btn" onclick="addRoomToConfig()">➕ Add New Room Workspace</button>
        <button class="config-save-btn" onclick="saveRoomConfig()">💾 Save & Sync Configurations</button>
    </div>
    
    <label for="roomSelect">Select Active Room:</label>
    <select id="roomSelect" onchange="updateResetButtonLabel(); renderActiveRoom();">
        </select>

    <div class="status-box">
        <label>Now Serving In This Room:</label>
        <div class="current-number" id="currentPatientDisplay">--</div>
    </div>

    <button class="main-call-btn" onclick="callNextPatient()">🔔 CALL NEXT CHRONOLOGICAL PATIENT</button>

    <div class="queue-section">
        <label for="newPatientSerial">Enlist New Patient To This Room:</label>
        <input type="number" id="newPatientSerial" placeholder="Enter Serial Number" pattern="\d*" onkeydown="if(event.key === 'Enter') { event.preventDefault(); addPatientToQueue(); }">
        <button class="add-btn" onclick="addPatientToQueue()">+ Add to Waiting List</button>
    </div>

    <label>Upcoming Waiting List:</label>
    <ul class="queue-list" id="queueListDisplay">
        </ul>

    <div class="reset-section">
        <button class="reset-btn" id="resetRoomBtn" onclick="resetActiveRoomOnly()">🧹 Reset Selected Room Data</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQUOxDh0o2y-aAxLb78tqogLMmcEOvhTg",
        authDomain: "mediqueue-mahmud.firebaseapp.com",
        databaseURL: "https://mediqueue-mahmud-default-rtdb.firebaseio.com",
        projectId: "mediqueue-mahmud",
        storageBucket: "mediqueue-mahmud.firebasestorage.app",
        messagingSenderId: "178718052989",
        appId: "1:178718052989:web:0157c134bcddedb21fd714",
        measurementId: "G-RTEG14XB87"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let globalDataState = {};
    let globalRoomsConfig = [];
    let localConfigState = [];
    let localWarnedState = {}; 

    database.ref('config/rooms').on('value', (snapshot) => {
        const rooms = snapshot.val();
        if (!rooms) {
            const defaultRooms = [
                { id: "room1", name: "Room 1 (রুম ১)" },
                { id: "room2", name: "Room 2 (রুম ২)" },
                { id: "room3", name: "Room 3 (রুম ৩)" },
                { id: "room4", name: "Room 4 (রুম ৪)" }
            ];
            database.ref('config/rooms').set(defaultRooms);
            return;
        }
        globalRoomsConfig = rooms;
        localConfigState = JSON.parse(JSON.stringify(rooms)); 
        populateRoomDropdown();
        renderActiveRoom();
    });

    database.ref().on('value', (snapshot) => {
        globalDataState = snapshot.val() || {};
        renderActiveRoom();
    });

    function initializeDateBanner() {
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const calendarString = new Date().toLocaleDateString('en-US', dateOptions);
        document.getElementById('liveDateDisplay').innerText = "📅 Today: " + calendarString;
    }
    initializeDateBanner();

    function getSelectedRoom() {
        return document.getElementById('roomSelect').value || "room1";
    }

    function populateRoomDropdown() {
        const select = document.getElementById('roomSelect');
        const currentSelection = select.value;
        select.innerHTML = '';
        
        globalRoomsConfig.forEach(room => {
            const opt = document.createElement('option');
            opt.value = room.id;
            opt.innerText = room.name;
            select.appendChild(opt);
        });

        if (globalRoomsConfig.some(r => r.id === currentSelection)) {
            select.value = currentSelection;
        } else if (globalRoomsConfig.length > 0) {
            select.value = globalRoomsConfig[0].id;
        }
        updateResetButtonLabel();
    }

    function updateResetButtonLabel() {
        const select = document.getElementById('roomSelect');
        const activeRoomName = select.options[select.selectedIndex]?.text || "Selected Room";
        document.getElementById('resetRoomBtn').innerText = `🧹 Reset ${activeRoomName} Logs`;
    }

    /* ADVANCED NATURAL ALPHANUMERIC ALGORITHM UTILITY */
    function sortLocalConfigStateAlphabetically() {
        localConfigState.sort((a, b) => {
            return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
        });
    }

    function toggleConfigPanel() {
        const panel = document.getElementById('configPanel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            panel.style.display = 'block';
            sortLocalConfigStateAlphabetically(); // Pre-sort existing nodes upon open sequence
            buildConfigPanelUI();
        }
    }

    function buildConfigPanelUI() {
        const container = document.getElementById('configRoomsContainer');
        container.innerHTML = '';
        localConfigState.forEach((room, index) => {
            const row = document.createElement('div');
            row.className = 'config-room-row';
            row.innerHTML = `
                <input type="text" value="${room.name}" oninput="updateLocalRoomName(${index}, this.value)" placeholder="Room Identity Name">
                <input type="button" class="config-del-btn" value="✕" onclick="removeRoomFromConfig(${index})">
            `;
            container.appendChild(row);
        });
    }

    function updateLocalRoomName(index, value) {
        localConfigState[index].name = value; // Avoid sorting directly on input to keep focus active
    }

    function removeRoomFromConfig(index) {
        localConfigState.splice(index, 1);
        buildConfigPanelUI();
    }

    function addRoomToConfig() {
        const nextIdNum = localConfigState.length + 1;
        localConfigState.push({
            id: "room" + Date.now(), 
            name: `Room ${nextIdNum}` // Default sequential naming convention
        });
        sortLocalConfigStateAlphabetically(); // Instant sort alignment upon item addition
        buildConfigPanelUI();
    }

    function saveRoomConfig() {
        if (localConfigState.length === 0) { alert("You must have at least one room active!"); return; }
        
        sortLocalConfigStateAlphabetically(); // Final verification sort right before database push
        
        database.ref('config/rooms').set(localConfigState).then(() => {
            alert("Room configurations successfully synced across the network!");
            document.getElementById('configPanel').style.display = 'none';
        });
    }

    function getCleanQueueArray(roomData) {
        if (!roomData || !roomData.queue) return [];
        return Object.keys(roomData.queue)
                     .sort((a, b) => parseInt(a) - parseInt(b))
                     .map(key => roomData.queue[key])
                     .filter(val => val !== null && val !== undefined);
    }

    function renderActiveRoom() {
        const roomId = getSelectedRoom();
        const roomData = globalDataState[roomId] || {};
        
        document.getElementById('currentPatientDisplay').innerText = roomData.current || '--';
        
        const queueListDisplay = document.getElementById('queueListDisplay');
        queueListDisplay.innerHTML = '';
        
        const queueArray = getCleanQueueArray(roomData);

        const todayStr = new Date().toLocaleDateString('en-CA');
        const lastReset = roomData.lastResetDate || "";

        if (lastReset !== todayStr && !localWarnedState[roomId] && ((roomData.current && roomData.current !== '--') || queueArray.length > 0)) {
            localWarnedState[roomId] = true; 
            
            setTimeout(() => {
                const activeRoomName = document.getElementById('roomSelect').options[document.getElementById('roomSelect').selectedIndex]?.text || "This room";
                const wipeStaleData = confirm(`🌞 GOOD MORNING REMINDER:\n"${activeRoomName}" contains leftover patient entries from an earlier shift!\n\nClick 'OK' to reset entries and start today fresh.\nClick 'Cancel' to keep these entries for now.`);
                
                if (wipeStaleData) {
                    executeRoomResetPayload(roomId);
                }
            }, 400);
        }

        if (queueArray.length > 0) {
            queueArray.forEach((serial, index) => {
                const li = document.createElement('li');
                li.className = 'queue-item';

                const upArrow = index > 0 ? `<button class="order-btn" onclick="moveOrder('${roomId}', ${index}, 'up')">▲</button>` : `<button class="order-btn" style="visibility:hidden; pointer-events:none;">▲</button>`;
                const downArrow = index < queueArray.length - 1 ? `<button class="order-btn" onclick="moveOrder('${roomId}', ${index}, 'down')">▼</button>` : `<button class="order-btn" style="visibility:hidden; pointer-events:none;">▼</button>`;

                li.innerHTML = `
                    <span>Serial: ${serial}</span>
                    <div class="action-btns">
                        ${upArrow}
                        ${downArrow}
                        <button class="move-btn" onclick="transferPatient('${roomId}', ${index}, '${serial}')">➡️ Move</button>
                        <button class="now-btn" onclick="callSpecificPatient('${roomId}', ${index}, '${serial}')">⚡ Call Now</button>
                        <button class="edit-btn" onclick="editQueueItem('${roomId}', ${index}, '${serial}')">Edit</button>
                        <button class="del-btn" onclick="deleteQueueItem('${roomId}', ${index})">Delete</button>
                    </div>
                `;
                queueListDisplay.appendChild(li);
            });
        } else {
            queueListDisplay.innerHTML = '<li style="color:#94a3b8; text-align:center; padding:10px; font-size:14px;">No patients waiting.</li>';
        }
    }

    function addPatientToQueue() {
        const roomId = getSelectedRoom();
        const inputField = document.getElementById('newPatientSerial');
        const serial = inputField.value.trim();
        
        if (!serial) { alert("Please input a valid serial number!"); inputField.focus(); return; }
        
        let roomData = globalDataState[roomId] || {};
        const todayStr = new Date().toLocaleDateString('en-CA');
        
        let queueArray = getCleanQueueArray(roomData);
        queueArray.push(serial);
        queueArray.sort((a, b) => parseInt(a) - parseInt(b));
        
        let updates = {};
        updates[roomId] = {
            current: roomData.current || '--',
            queue: queueArray,
            lastResetDate: roomData.lastResetDate || todayStr
        };
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates).then(() => {
            inputField.value = '';
            inputField.focus(); 
        });
    }

    function transferPatient(fromRoom, index, serial) {
        let optionsPrompt = "Move Serial " + serial + " to another active workspace:\n";
        globalRoomsConfig.forEach((r, idx) => {
            if (r.id !== fromRoom) optionsPrompt += `\nEnter [ ${idx + 1} ] for ${r.name}`;
        });
        
        const selectionInput = prompt(optionsPrompt);
        if (selectionInput === null) return;
        
        const pickedIdx = parseInt(selectionInput.trim()) - 1;
        if (isNaN(pickedIdx) || pickedIdx < 0 || pickedIdx >= globalRoomsConfig.length) { alert("Invalid index selection!"); return; }
        
        const targetRoomId = globalRoomsConfig[pickedIdx].id;
        if (targetRoomId === fromRoom) { alert("Patient is already inside that room tree selection!"); return; }

        const fromRoomData = globalDataState[fromRoom] || {};
        let fromQueue = getCleanQueueArray(fromRoomData);
        fromQueue.splice(index, 1);

        const targetRoomData = globalDataState[targetRoomId] || {};
        let targetQueue = getCleanQueueArray(targetRoomData);
        targetQueue.push(serial);
        targetQueue.sort((a, b) => parseInt(a) - parseInt(b));

        let updates = {};
        updates[fromRoom] = { current: fromRoomData.current || '--', queue: fromQueue.length > 0 ? fromQueue : null, lastResetDate: fromRoomData.lastResetDate || "" };
        updates[targetRoomId] = { current: targetRoomData.current || '--', queue: targetQueue, lastResetDate: targetRoomData.lastResetDate || "" };
        updates['authSecret'] = "INMAS-Mitford2026!";

        database.ref().update(updates);
    }

    function callNextPatient() {
        const roomId = getSelectedRoom();
        const roomData = globalDataState[roomId] || {};
        let queueArray = getCleanQueueArray(roomData);
        
        if (queueArray.length === 0) { alert("The waiting list for this room is currently empty!"); return; }
        
        const nextSerial = queueArray.shift();
        
        let updates = {};
        updates[roomId] = {
            current: nextSerial,
            queue: queueArray.length > 0 ? queueArray : null,
            lastResetDate: roomData.lastResetDate || new Date().toLocaleDateString('en-CA')
        };
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates);
    }

    function moveOrder(roomId, index, direction) {
        const roomData = globalDataState[roomId] || {};
        let queueArray = getCleanQueueArray(roomData);

        const targetIndex = direction === 'up' ? index - 1 : index + 1;
        if (targetIndex < 0 || targetIndex >= queueArray.length) return;

        const temp = queueArray[index];
        queueArray[index] = queueArray[targetIndex];
        queueArray[targetIndex] = temp;

        let updates = {};
        updates[roomId] = { current: roomData.current || '--', queue: queueArray, lastResetDate: roomData.lastResetDate || "" };
        updates['authSecret'] = "INMAS-Mitford2026!";

        database.ref().update(updates);
    }

    function callSpecificPatient(roomId, index, serial) {
        if (!confirm(`EMERGENCY OVERRIDE:\nAre you sure you want to call Serial ${serial} immediately?`)) return;
        
        const roomData = globalDataState[roomId] || {};
        let queueArray = getCleanQueueArray(roomData);
        queueArray.splice(index, 1);

        let updates = {};
        updates[roomId] = { current: serial, queue: queueArray.length > 0 ? queueArray : null, lastResetDate: roomData.lastResetDate || "" };
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates);
    }

    function editQueueItem(roomId, index, currentSerial) {
        const newSerial = prompt("Update Serial Number:", currentSerial);
        if (newSerial === null || newSerial.trim() === "") return;
        
        const roomData = globalDataState[roomId] || {};
        let queueArray = getCleanQueueArray(roomData);

        queueArray[index] = newSerial.trim();
        queueArray.sort((a, b) => parseInt(a) - parseInt(b));

        let updates = {};
        updates[roomId] = { current: roomData.current || '--', queue: queueArray, lastResetDate: roomData.lastResetDate || "" };
        updates['authSecret'] = "INMAS-Mitford2026!";
        database.ref().update(updates);
    }

    function deleteQueueItem(roomId, index) {
        if (!confirm("Are you sure you want to remove this patient from the line?")) return;
        
        const roomData = globalDataState[roomId] || {};
        let queueArray = getCleanQueueArray(roomData);
        queueArray.splice(index, 1);

        let updates = {};
        updates[roomId] = { current: roomData.current || '--', queue: queueArray.length > 0 ? queueArray : null, lastResetDate: roomData.lastResetDate || "" };
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates);
    }

    function resetActiveRoomOnly() {
        const roomId = getSelectedRoom();
        if (!confirm(`🚨 SHIFT CLEARANCE:\nAre you sure you want to wipe data for this selected room slot?`)) return;
        executeRoomResetPayload(roomId);
    }

    function executeRoomResetPayload(roomId) {
        const todayStr = new Date().toLocaleDateString('en-CA');
        let updates = {};
        updates[roomId] = {
            current: '--',
            queue: null,
            lastResetDate: todayStr 
        };
        updates['authSecret'] = "INMAS-Mitford2026!";

        database.ref().update(updates).then(() => {
            localWarnedState[roomId] = true; 
            alert(`Room workspace successfully reset for today's new shift.`);
        });
    }
</script>
</body>
</html>
