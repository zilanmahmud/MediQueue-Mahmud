<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Advanced Queue Manager</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { color: #1a73e8; margin: 0 0 15px 0; text-align: center; }
        label { font-weight: bold; color: #4a5568; font-size: 14px; }
        select, input { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #dadce0; border-radius: 8px; margin: 8px 0 15px 0; box-sizing: border-box; }
        select { background-color: #f8fafc; font-weight: bold; color: #1a73e8; border-color: #1a73e8; }
        
        .main-call-btn { width: 100%; padding: 18px; font-size: 20px; font-weight: bold; color: white; background: #34a853; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(52,168,83,0.3); }
        .add-btn { background: #1a73e8; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        .status-box { padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; text-align: center; }
        .current-number { font-size: 32px; font-weight: bold; color: #ea4335; margin: 5px 0; }
        
        .queue-section { border-top: 2px dashed #e2e8f0; padding-top: 15px; }
        .queue-list { list-style: none; padding: 0; margin: 0; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8fafc; margin-bottom: 8px; border-radius: 6px; border: 1px solid #e2e8f0; flex-wrap: wrap; gap: 10px; }
        .queue-item span { font-size: 18px; font-weight: bold; color: #334155; }
        
        .action-btns { display: flex; gap: 5px; }
        .action-btns button { padding: 8px 12px; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .now-btn { background: #e11d48; } /* Crimson red for urgent attention */
        .edit-btn { background: #f9ab00; }
        .del-btn { background: #70757a; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2>MediQueue Panel</h2>
    
    <label for="roomSelect">SELECT ACTIVE ROOM:</label>
    <select id="roomSelect" onchange="renderActiveRoom()">
        <option value="1">Room 1 (রুম ১)</option>
        <option value="2">Room 2 (রুম ২)</option>
        <option value="3">Room 3 (রুম ৩)</option>
        <option value="4">Room 4 (রুম ৪)</option>
    </select>

    <div class="status-box">
        <div style="font-size: 14px; color: #64748b; font-weight: bold;">NOW SERVING IN THIS ROOM:</div>
        <div class="current-number" id="currentPatientDisplay">--</div>
    </div>

    <button class="main-call-btn" onclick="callNextPatient()">🔔 CALL NEXT CHRONOLOGICAL PATIENT</button>

    <div class="queue-section">
        <label for="newPatientSerial">ENLIST NEW PATIENT TO THIS ROOM:</label>
        <input type="number" id="newPatientSerial" placeholder="Enter Serial Number" pattern="\d*">
        <button class="add-btn" onclick="addPatientToQueue()">+ Add to Waiting List</button>
    </div>

    <label>UPCOMING WAITING LIST:</label>
    <ul class="queue-list" id="queueListDisplay">
        </ul>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQUOxDh0o2y-aAxLb78tqogLMmcEOvhTg",
        authDomain: "mediqueue-mahmud.firebaseapp.com",
        databaseURL: "https://mediqueue-mahmud-default-rtdb.firebaseio.com",
        projectId: "mediqueue-mahmud",
        storageBucket: "mediqueue-mahmud.firebasestorage.app",
        messagingSenderId: "178718052989",
        appId: "1:178718052989:web:0157c134bcddedb21fd714",
        measurementId: "G-RTEG14XB87"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let globalDataState = {};

    database.ref().on('value', (snapshot) => {
        globalDataState = snapshot.val() || {};
        renderActiveRoom();
    });

    function getSelectedRoom() {
        return document.getElementById('roomSelect').value;
    }

    function renderActiveRoom() {
        const roomNum = getSelectedRoom();
        const roomData = globalDataState["room" + roomNum] || {};
        
        document.getElementById('currentPatientDisplay').innerText = roomData.current || '--';
        
        const queueListDisplay = document.getElementById('queueListDisplay');
        queueListDisplay.innerHTML = '';
        
        if (roomData.queue) {
            const sortedKeys = Object.keys(roomData.queue).sort();
            sortedKeys.forEach((key) => {
                const serial = roomData.queue[key];
                const li = document.createElement('li');
                li.className = 'queue-item';
                li.innerHTML = `
                    <span>Serial: ${serial}</span>
                    <div class="action-btns">
                        <button class="now-btn" onclick="callSpecificPatient('${roomNum}', '${key}', '${serial}')">⚡ Call Now</button>
                        <button class="edit-btn" onclick="editQueueItem('${roomNum}', '${key}', '${serial}')">Edit</button>
                        <button class="del-btn" onclick="deleteQueueItem('${roomNum}', '${key}')">Delete</button>
                    </div>
                `;
                queueListDisplay.appendChild(li);
            });
        } else {
            queueListDisplay.innerHTML = '<li style="color:#94a3b8; text-align:center; padding:10px; font-size:14px;">No patients waiting.</li>';
        }
    }

    function addPatientToQueue() {
        const roomNum = getSelectedRoom();
        const inputField = document.getElementById('newPatientSerial');
        const serial = inputField.value.trim();
        
        if (!serial) { alert("Please input a valid serial number!"); return; }
        
        let updates = {};
        const timestampId = Date.now();
        updates[`room${roomNum}/queue/${timestampId}`] = serial;
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates).then(() => {
            inputField.value = '';
        });
    }

    function callNextPatient() {
        const roomNum = getSelectedRoom();
        const roomData = globalDataState["room" + roomNum] || {};
        
        if (!roomData.queue) {
            alert("The waiting list for this room is currently empty!");
            return;
        }
        
        const sortedKeys = Object.keys(roomData.queue).sort();
        const nextId = sortedKeys[0];
        const nextSerial = roomData.queue[nextId];
        
        let updates = {};
        updates[`room${roomNum}/current`] = nextSerial;
        updates[`room${roomNum}/queue/${nextId}`] = null;
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates);
    }

    // NEW CLINICAL OVERRIDE FUNCTION
    function callSpecificPatient(roomNum, itemId, serial) {
        if (!confirm(`EMERGENCY OVERRIDE:\nAre you sure you want to bypass the queue and call Serial ${serial} to Room ${roomNum} immediately?`)) return;
        
        let updates = {};
        updates[`room${roomNum}/current`] = serial;   // Promotes them to active display immediately
        updates[`room${roomNum}/queue/${itemId}`] = null; // Removes them from their spot in the waiting list
        updates['authSecret'] = "INMAS-Mitford2026!";
        
        database.ref().update(updates);
    }

    function editQueueItem(roomNum, itemId, currentSerial) {
        const newSerial = prompt("Update Serial Number:", currentSerial);
        if (newSerial === null || newSerial.trim() === "") return;
        
        let updates = {};
        updates[`room${roomNum}/queue/${itemId}`] = newSerial.trim();
        updates['authSecret'] = "INMAS-Mitford2026!";
        database.ref().update(updates);
    }

    function deleteQueueItem(roomNum, itemId) {
        if (!confirm("Are you sure you want to remove this patient from the line?")) return;
        
        let updates = {};
        updates[`room${roomNum}/queue/${itemId}`] = null;
        updates['authSecret'] = "INMAS-Mitford2026!";
        database.ref().update(updates);
    }
</script>
</body>
</html>
